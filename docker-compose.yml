# crbox-alerts docker compose
#
# Services:
#   backend   — FastAPI app, SQLite at ./data/alerts.db, RSS poller via APScheduler
#   frontend  — nginx serving React build + proxying /api -> backend
#
# Edge routing on NAS3:
#   The existing `networking` stack already runs cloudflared + traefik on
#   the external network `proxy`. Cloudflared tunnels traffic to
#   traefik:8443 (entrypoint `tunnel`) and traefik dispatches by Host().
#   We attach `frontend` to `proxy` and declare traefik labels routing
#   alerts.crbox.ca through the `tunnel` entrypoint.
#
#   Auth is Cloudflare Access at the edge — the backend verifies the
#   Cf-Access-Jwt-Assertion JWT directly.
#
# Local dev:
#   cp .env.example .env  &&  docker compose up --build
#   Frontend on http://localhost:8080 (built image), backend on
#   http://localhost:8001. For Vite HMR: `cd frontend && npm install
#   && npm run dev` — Vite serves on :5173 and proxies /api to :8000.

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/alerts.db
      DATA_DIR: /data
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://alerts.crbox.ca}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-30}
      GMAIL_LOOKBACK_DAYS: ${GMAIL_LOOKBACK_DAYS:-7}
      BACKUP_HOUR: ${BACKUP_HOUR:-4}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-30}
      ITEM_RETENTION_DAYS: ${ITEM_RETENTION_DAYS:-180}
    volumes:
      - ./data:/data
    networks:
      - app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.crbox-alerts.rule=Host(`alerts.crbox.ca`)"
      - "traefik.http.routers.crbox-alerts.entrypoints=tunnel"
      - "traefik.http.services.crbox-alerts.loadbalancer.server.port=80"

networks:
  app:
    driver: bridge
  proxy:
    external: true
